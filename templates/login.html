<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Alkira Tenant Dashboard</title>
    <style>
        :root {
            --bg: #f5f7fa;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text: #1a202c;
            --text-secondary: #718096;
            --primary: #2b6cb0;
            --primary-hover: #2c5282;
            --primary-light: #ebf4ff;
            --error: #e53e3e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .login-brand {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 8px;
        }
        .login-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 14px;
            margin-bottom: 32px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }
        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: var(--primary-hover);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            color: var(--error);
            font-size: 13px;
            text-align: center;
            margin-top: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">Alkira Tenant Dashboard</div>
        <div class="login-subtitle">Sign in to continue</div>
        <form id="login-form" onsubmit="doLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autocomplete="username" autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="login-btn" id="login-btn">Sign In</button>
        </form>
        <div class="error-msg" id="error-msg">Invalid username or password.</div>
    </div>
    <script>
    function doLogin(e) {
        e.preventDefault();
        var user = document.getElementById('username').value;
        var pass = document.getElementById('password').value;
        var btn = document.getElementById('login-btn');
        var err = document.getElementById('error-msg');
        err.style.display = 'none';
        btn.disabled = true;
        btn.textContent = 'Signing in...';

        fetch('/auth-check', {
            method: 'GET',
            headers: { 'Authorization': 'Basic ' + btoa(user + ':' + pass) }
        }).then(function(resp) {
            if (resp.ok) {
                // Set session cookie and redirect to dashboard
                document.cookie = 'alkira_session=alkira_dashboard_auth; path=/';
                window.location.href = '/';
            } else {
                err.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }).catch(function() {
            err.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Sign In';
        });
    }
    </script>
</body>
</html>
