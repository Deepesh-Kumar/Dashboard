# oauth2-proxy config for Okta OIDC (v7.x format — use underscores, not hyphens)
# Replace CLIENT_ID, CLIENT_SECRET, COOKIE_SECRET before deploying

provider = "oidc"
# Use org-level issuer (not /oauth2/default which requires custom auth server)
oidc_issuer_url = "https://OKTA_DOMAIN"
client_id = "CLIENT_ID"
client_secret = "CLIENT_SECRET"

# Generate with: python3 -c "import secrets; print(secrets.token_urlsafe(32)[:32])"
# Must be exactly 16, 24, or 32 bytes
cookie_secret = "COOKIE_SECRET"

cookie_secure = true
cookie_name = "_alkira_oauth2"
email_domains = ["alkira.com"]

upstreams = ["http://127.0.0.1:8080/"]
http_address = "127.0.0.1:4180"
redirect_url = "https://dashboard.alkira.cc/oauth2/callback"

skip_provider_button = true
silence_ping_logging = true
