map $cookie_alkira_session $local_auth {
    "alkira_dashboard_auth" 1;
    default 0;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name dashboard.alkira.cc;
    return 301 https://$host$request_uri;
}

# Main HTTPS server — dual auth: Okta (primary) + local cookie (last resort)
server {
    listen 443 ssl;
    server_name dashboard.alkira.cc;

    ssl_certificate     /etc/letsencrypt/live/dashboard.alkira.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dashboard.alkira.cc/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    root /var/www/dashboard;
    index home.html index.html;

    # Internal auth check: local cookie takes priority, then Okta session
    location = /_auth_check {
        internal;
        if ($local_auth = 1) { return 200; }
        proxy_pass              http://127.0.0.1:4180/oauth2/auth;
        proxy_set_header        Content-Length "";
        proxy_pass_request_body off;
        proxy_set_header        X-Original-URI $request_uri;
    }

    # Okta login flow handled by oauth2-proxy
    location /oauth2/ {
        proxy_pass              http://127.0.0.1:4180;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        X-Auth-Request-Redirect $request_uri;
    }

    # Unauthenticated pages
    location = /login-choice.html { try_files $uri =404; }
    location = /login.html        { try_files $uri =404; }

    # Local auth check endpoint (used by login.html form)
    location = /auth-check {
        auth_basic "Alkira Dashboard";
        auth_basic_user_file /etc/nginx/.htpasswd;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Dashboard API (editable data)
    location /api/ {
        auth_request /_auth_check;
        error_page 401 502 = @login_redirect;
        proxy_pass         http://127.0.0.1:5000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
    }

    # Static assets
    location /static/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Health check
    location = /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # All dashboard pages — require Okta OR local session
    location / {
        auth_request /_auth_check;
        error_page 401 502 = @login_redirect;
        try_files $uri $uri/ =404;
    }

    location @login_redirect {
        return 302 /login-choice.html;
    }
}
